[package]
name = "reticulum-router"
version = "1.0.1"
edition = "2024"

[dependencies]
dirs = "6.0"
rand = "0.8"
serde = "1.0.228"
toml = "1.0"

# Async IO
tokio = { version = "1.44.2", features = ["full"] }
tokio-stream = "0.1.17"
tokio-util = "0.7.15"

# Logging
log = "0.4"
env_logger = "0.10"

# Core Reticulum Implementation
#reticulum = "0.1.0"
## Fixes for several major bugs which have been submitted upstream
reticulum = { git = "https://github.com/GhostMeshLabs/reticulum-rs.git", rev = "2837fe0094fbf9f93a7ebb27c8809c24ad0d3046" }
