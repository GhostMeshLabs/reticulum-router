[package]
name = "reticulum-router"
version = "1.0.2"
edition = "2024"

[dependencies]
dirs = "6.0"
rand = "0.8"
serde = "1.0.228"
toml = "1.0"

# Async IO
tokio = { version = "1.44.2", features = ["full"] }
tokio-stream = "0.1.17"
tokio-util = "0.7.15"

# Logging
log = "0.4"
env_logger = "0.10"

# Core Reticulum Implementation
#reticulum-sdk = "0.1.0"
## Fixes for several major bugs which have been submitted upstream
reticulum-sdk = { git = "https://github.com/GhostMeshLabs/reticulum-sdk.git", rev = "0e78d0a77cbd254f1c2bc76363b46ad216438e6c" }
